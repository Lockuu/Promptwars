version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  simulator:
    build:
      context: ./simulator
    environment:
      - API_URL=http://backend:8080/api/sensor-update
    depends_on:
      - backend
